// ==================== HELPERS ====================
const fmt = (n) => Number(n || 0).toFixed(3);

const formatDate = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} - ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};

const formatDateShort = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
};

const isToday = (ts) => {
  if (!ts) return false;
  const d = new Date(ts);
  const now = new Date();
  return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
};

// Convert DB row → App format
const dbOrderToApp = (row) => ({
  id: row.id,
  orderNumber: row.order_number,
  customerName: row.customer_name,
  customerPhone: row.customer_phone || '',
  address: row.address || { area: '', block: '', street: '', avenue: '', house: '', extra: '' },
  items: row.items || [],
  subtotal: Number(row.subtotal) || 0,
  deliveryFee: Number(row.delivery_fee) || 0,
  total: Number(row.total) || 0,
  paymentMethod: row.payment_method || 'cash',
  source: row.source || 'whatsapp',
  status: row.status || 'new',
  notes: row.notes || '',
  createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
  updatedAt: row.updated_at ? new Date(row.updated_at).getTime() : Date.now()
});

const appOrderToDb = (order) => ({
  customer_name: order.customerName,
  customer_phone: order.customerPhone || null,
  address: order.address || {},
  items: order.items || [],
  subtotal: order.subtotal || 0,
  delivery_fee: order.deliveryFee || 0,
  total: order.total || 0,
  payment_method: order.paymentMethod || 'cash',
  source: order.source || 'whatsapp',
  status: order.status || 'new',
  notes: order.notes || null
});

const dbProductToApp = (row) => ({
  id: row.id,
  name: row.name,
  price: Number(row.price) || 0,
  createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now()
});

// ==================== MAIN APP ====================
function OrderManagementApp() {
  const [orders, setOrders] = useState([]);
  const [products, setProducts] = useState([]);
  const [settings, setSettings] = useState({ shopName: 'متجري', shopPhone: '', defaultDeliveryFee: 1.000 });
  const [loaded, setLoaded] = useState(false);
  const [connError, setConnError] = useState(null);
  const [view, setView] = useState('dashboard');
  const [editingOrder, setEditingOrder] = useState(null);
  const [viewingOrder, setViewingOrder] = useState(null);
  const [editingProduct, setEditingProduct] = useState(null);
  const [showOrderForm, setShowOrderForm] = useState(false);
  const [showProductForm, setShowProductForm] = useState(false);
  const [printOrder, setPrintOrder] = useState(null);
  const [toast, setToast] = useState(null);

  // Load all data from Supabase
  const loadData = async () => {
    try {
      const [ordersRes, productsRes, settingsRes] = await Promise.all([
        sb.from('orders').select('*').order('created_at', { ascending: false }),
        sb.from('products').select('*').order('created_at', { ascending: false }),
        sb.from('settings').select('*').eq('id', 1).maybeSingle()
      ]);

      if (ordersRes.error) throw ordersRes.error;
      if (productsRes.error) throw productsRes.error;
      if (settingsRes.error) throw settingsRes.error;

      setOrders((ordersRes.data || []).map(dbOrderToApp));
      setProducts((productsRes.data || []).map(dbProductToApp));
      if (settingsRes.data) {
        setSettings({
          shopName: settingsRes.data.shop_name || 'متجري',
          shopPhone: settingsRes.data.shop_phone || '',
          defaultDeliveryFee: Number(settingsRes.data.default_delivery_fee) || 1.000
        });
      }
      setConnError(null);
    } catch (err) {
      console.error('Load error:', err);
      setConnError(err.message || 'فشل الاتصال بالسحابة');
    } finally {
      setLoaded(true);
      const el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }
  };

  useEffect(() => {
    loadData();
  }, []);

  // Realtime subscription
  useEffect(() => {
    if (!loaded) return;
    const channel = sb
      .channel('orders-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
        loadData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, () => {
        loadData();
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [loaded]);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  // ========== ORDER ACTIONS ==========
  const saveOrder = async (order) => {
    try {
      const payload = appOrderToDb(order);
      if (order.id) {
        const { error } = await sb.from('orders').update(payload).eq('id', order.id);
        if (error) throw error;
        showToast('تم تحديث الطلب');
      } else {
        const { error } = await sb.from('orders').insert(payload);
        if (error) throw error;
        showToast('تم إضافة الطلب');
      }
      setShowOrderForm(false);
      setEditingOrder(null);
      await loadData();
    } catch (err) {
      console.error(err);
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  const deleteOrder = async (id) => {
    if (!window.confirm('تبي تحذف الطلب؟ ما راح نقدر نرجعه.')) return;
    try {
      const { error } = await sb.from('orders').delete().eq('id', id);
      if (error) throw error;
      setViewingOrder(null);
      showToast('تم حذف الطلب');
      await loadData();
    } catch (err) {
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  const updateOrderStatus = async (id, status) => {
    try {
      const { error } = await sb.from('orders').update({ status }).eq('id', id);
      if (error) throw error;
      await loadData();
    } catch (err) {
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  // ========== PRODUCT ACTIONS ==========
  const saveProduct = async (product) => {
    try {
      const payload = { name: product.name, price: product.price };
      if (product.id) {
        const { error } = await sb.from('products').update(payload).eq('id', product.id);
        if (error) throw error;
        showToast('تم تحديث المنتج');
      } else {
        const { error } = await sb.from('products').insert(payload);
        if (error) throw error;
        showToast('تم إضافة المنتج');
      }
      setShowProductForm(false);
      setEditingProduct(null);
      await loadData();
    } catch (err) {
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  const deleteProduct = async (id) => {
    if (!window.confirm('تبي تحذف المنتج؟')) return;
    try {
      const { error } = await sb.from('products').delete().eq('id', id);
      if (error) throw error;
      showToast('تم حذف المنتج');
      await loadData();
    } catch (err) {
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  const saveSettings = async (newSettings) => {
    try {
      const { error } = await sb.from('settings').update({
        shop_name: newSettings.shopName,
        shop_phone: newSettings.shopPhone,
        default_delivery_fee: newSettings.defaultDeliveryFee
      }).eq('id', 1);
      if (error) throw error;
      setSettings(newSettings);
      showToast('تم حفظ الإعدادات');
    } catch (err) {
      showToast('خطأ: ' + err.message, 'error');
    }
  };

  if (!loaded) return null;

  // Connection error
  if (connError) {
    return (
      <div dir="rtl" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', backgroundColor: '#f6f2eb' }}>
        <div style={{ maxWidth: '480px', backgroundColor: '#ffffff', borderRadius: '16px', padding: '32px', textAlign: 'center', border: '1px solid #fecaca' }}>
          <div style={{ width: '64px', height: '64px', borderRadius: '16px', backgroundColor: '#fef2f2', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
            <AlertTriangle size={28} color="#b91c1c" />
          </div>
          <h2 className="font-display" style={{ margin: '0 0 8px', fontSize: '18px', fontWeight: 600 }}>ما قدرنا نوصل للسحابة</h2>
          <p style={{ margin: '0 0 16px', fontSize: '14px', color: '#6b6558', lineHeight: 1.6 }}>{connError}</p>
          <button onClick={loadData} style={primaryBtn}>حاول مرة ثانية</button>
        </div>
      </div>
    );
  }

  return (
    <div dir="rtl" style={{ minHeight: '100vh', backgroundColor: '#f6f2eb' }}>
      <header className="no-print" style={{ backgroundColor: '#ffffff', borderBottom: '1px solid #e8e2d4' }}>
        <div style={{ maxWidth: '1280px', margin: '0 auto', padding: '18px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            <div style={{ width: '40px', height: '40px', borderRadius: '10px', backgroundColor: '#0f5e52', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Store size={20} color="#ffffff" strokeWidth={2} />
            </div>
            <div>
              <h1 className="font-display" style={{ margin: 0, fontSize: '18px', fontWeight: 600, color: '#1f1b12' }}>{settings.shopName || 'متجري'}</h1>
              <p style={{ margin: 0, fontSize: '12px', color: '#8a7e66' }}>لوحة إدارة الطلبات</p>
            </div>
          </div>
          <button onClick={() => { setEditingOrder(null); setShowOrderForm(true); }}
            style={{ display: 'flex', alignItems: 'center', gap: '8px', backgroundColor: '#0f5e52', color: '#ffffff', border: 'none', padding: '10px 18px', borderRadius: '10px', fontSize: '14px', fontWeight: 600, cursor: 'pointer' }}>
            <Plus size={16} /> طلب جديد
          </button>
        </div>
      </header>

      <nav className="no-print" style={{ backgroundColor: '#ffffff', borderBottom: '1px solid #e8e2d4', position: 'sticky', top: 0, zIndex: 10 }}>
        <div className="hide-scrollbar" style={{ maxWidth: '1280px', margin: '0 auto', display: 'flex', gap: '4px', padding: '0 16px', overflowX: 'auto' }}>
          {[
            { id: 'dashboard', label: 'لوحة التحكم', Icon: LayoutDashboard },
            { id: 'orders', label: 'الطلبات', Icon: ShoppingBag },
            { id: 'products', label: 'المنتجات', Icon: Package },
            { id: 'settings', label: 'الإعدادات', Icon: SettingsIcon }
          ].map(t => {
            const active = view === t.id;
            return (
              <button key={t.id} onClick={() => setView(t.id)}
                style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '14px 18px', backgroundColor: 'transparent', border: 'none', borderBottom: active ? '2px solid #0f5e52' : '2px solid transparent', color: active ? '#0f5e52' : '#6b6558', fontWeight: active ? 600 : 500, fontSize: '14px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                <t.Icon size={16} /> {t.label}
              </button>
            );
          })}
        </div>
      </nav>

      <main className="no-print" style={{ maxWidth: '1280px', margin: '0 auto', padding: '24px 16px' }}>
        {view === 'dashboard' && <DashboardView orders={orders} onViewOrder={setViewingOrder} onNewOrder={() => { setEditingOrder(null); setShowOrderForm(true); }} onGoToOrders={() => setView('orders')} />}
        {view === 'orders' && <OrdersView orders={orders} onView={setViewingOrder} onEdit={(o) => { setEditingOrder(o); setShowOrderForm(true); }} onStatusChange={updateOrderStatus} onPrint={setPrintOrder} onNewOrder={() => { setEditingOrder(null); setShowOrderForm(true); }} />}
        {view === 'products' && <ProductsView products={products} onAdd={() => { setEditingProduct(null); setShowProductForm(true); }} onEdit={(p) => { setEditingProduct(p); setShowProductForm(true); }} onDelete={deleteProduct} />}
        {view === 'settings' && <SettingsView settings={settings} onSave={saveSettings} />}
      </main>

      {showOrderForm && <OrderFormModal order={editingOrder} products={products} defaultDeliveryFee={settings.defaultDeliveryFee} onSave={saveOrder} onClose={() => { setShowOrderForm(false); setEditingOrder(null); }} />}
      {viewingOrder && <OrderDetailModal order={viewingOrder} onClose={() => setViewingOrder(null)} onEdit={() => { setEditingOrder(viewingOrder); setViewingOrder(null); setShowOrderForm(true); }} onDelete={() => deleteOrder(viewingOrder.id)} onStatusChange={(s) => { updateOrderStatus(viewingOrder.id, s); setViewingOrder({ ...viewingOrder, status: s }); }} onPrint={() => { setPrintOrder(viewingOrder); setViewingOrder(null); }} />}
      {showProductForm && <ProductFormModal product={editingProduct} onSave={saveProduct} onClose={() => { setShowProductForm(false); setEditingProduct(null); }} />}
      {printOrder && <InvoicePrintView order={printOrder} settings={settings} onClose={() => setPrintOrder(null)} />}

      <div className="cloud-badge no-print">
        <Cloud size={12} /> متصل بالسحابة
      </div>

      {toast && (
        <div className="animate-slide-up" style={{ position: 'fixed', bottom: '60px', left: '50%', transform: 'translateX(-50%)', backgroundColor: toast.type === 'error' ? '#b91c1c' : '#0f5e52', color: '#ffffff', padding: '12px 20px', borderRadius: '10px', fontSize: '14px', fontWeight: 500, zIndex: 100, boxShadow: '0 4px 12px rgba(0,0,0,0.15)', display: 'flex', alignItems: 'center', gap: '8px' }}>
          {toast.type === 'error' ? <AlertTriangle size={16} /> : <Check size={16} />} {toast.msg}
        </div>
      )}
    </div>
  );
}

// ==================== DASHBOARD ====================
function DashboardView({ orders, onViewOrder, onNewOrder, onGoToOrders }) {
  const stats = useMemo(() => {
    const newOrders = orders.filter(o => o.status === 'new').length;
    const preparing = orders.filter(o => o.status === 'preparing').length;
    const deliveredToday = orders.filter(o => o.status === 'delivered' && isToday(o.updatedAt)).length;
    const revenueToday = orders.filter(o => o.status === 'delivered' && isToday(o.updatedAt)).reduce((s, o) => s + (o.total || 0), 0);
    return { newOrders, preparing, deliveredToday, revenueToday };
  }, [orders]);

  const recentOrders = orders.slice(0, 5);

  return (
    <div className="animate-fade-in">
      <h2 className="font-display" style={{ margin: '0 0 20px', fontSize: '22px', fontWeight: 600 }}>لوحة التحكم</h2>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '12px', marginBottom: '28px' }}>
        <StatCard label="طلبات جديدة" value={stats.newOrders} color="#3b82f6" Icon={Clock} />
        <StatCard label="قيد التجهيز" value={stats.preparing} color="#f59e0b" Icon={Package} />
        <StatCard label="تم التوصيل اليوم" value={stats.deliveredToday} color="#10b981" Icon={CheckCircle2} />
        <StatCard label="إيرادات اليوم" value={fmt(stats.revenueToday)} suffix="د.ك" color="#0f5e52" Icon={Receipt} />
      </div>
      <div style={{ backgroundColor: '#ffffff', border: '1px solid #e8e2d4', borderRadius: '14px', overflow: 'hidden' }}>
        <div style={{ padding: '16px 20px', borderBottom: '1px solid #e8e2d4', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h3 className="font-display" style={{ margin: 0, fontSize: '16px', fontWeight: 600 }}>آخر الطلبات</h3>
          {orders.length > 5 && <button onClick={onGoToOrders} style={{ background: 'none', border: 'none', color: '#0f5e52', fontSize: '13px', fontWeight: 600, cursor: 'pointer' }}>عرض الكل</button>}
        </div>
        {recentOrders.length === 0 ? (
          <EmptyState icon={<ShoppingBag size={32} color="#bdb29a" />} title="ما فيه طلبات بعد" description="أضف أول طلب ويرا بياناتك هني" action={<button onClick={onNewOrder} style={primaryBtn}>إضافة طلب</button>} />
        ) : (
          <div>{recentOrders.map(o => <OrderRow key={o.id} order={o} onClick={() => onViewOrder(o)} />)}</div>
        )}
      </div>
    </div>
  );
}

    if (statusFilter !== 'all' && o.status !== statusFilter) return false;
    if (search) {
      const q = search.toLowerCase();
      return String(o.orderNumber).includes(q) || (o.customerName || '').toLowerCase().includes(q) || (o.customerPhone || '').includes(q);
    }
    return true;
  }), [orders, search, statusFilter]);

  return (
    <div className="animate-fade-in">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>

          الطلبات <span style={{ color: '#8a7e66', fontSize: '16px', fontWeight: 500 }}>({orders.length})</span>
        </h2>
      </div>

            style={{ width: '100%', padding: '10px 40px 10px 14px', border: '1px solid #e8e2d4', borderRadius: '10px', backgroundColor: '#ffffff', fontSize: '14px' }} />
        </div>
        <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
          {[{ val: 'all', label: 'الكل' }, ...Object.entries(STATUSES).map(([k, v]) => ({ val: k, label: v.label }))].map(f => {
            const active = statusFilter === f.val;
            return (
              <button key={f.val} onClick={() => setStatusFilter(f.val)}
                style={{ padding: '10px 14px', fontSize: '13px', fontWeight: 500, border: '1px solid ' + (active ? '#0f5e52' : '#e8e2d4'), backgroundColor: active ? '#0f5e52' : '#ffffff', color: active ? '#ffffff' : '#4a4438', borderRadius: '10px', cursor: 'pointer', whiteSpace: 'nowrap' }}>
                {f.label}
              </button>

        {filtered.length === 0 ? (
          <EmptyState icon={<ShoppingBag size={32} color="#bdb29a" />} title={orders.length === 0 ? 'ما فيه طلبات بعد' : 'ما فيه نتائج'} description={orders.length === 0 ? 'أضف أول طلب' : 'جرب تغير البحث أو الفلتر'} action={orders.length === 0 && <button onClick={onNewOrder} style={primaryBtn}>إضافة طلب</button>} />
        ) : (
          filtered.map(o => <OrderRow key={o.id} order={o} onClick={() => onView(o)} showActions onEdit={() => onEdit(o)} onPrint={() => onPrint(o)} onStatusChange={(s) => onStatusChange(o.id, s)} />)
        )}
      </div>
    </div>
  );
}

// ==================== ORDER FORM ====================
function OrderFormModal({ order, products, defaultDeliveryFee, onSave, onClose }) {
  const [form, setForm] = useState(order || {
    customerName: '', customerPhone: '',
    address: { area: '', block: '', street: '', avenue: '', house: '', extra: '' },
    items: [], deliveryFee: defaultDeliveryFee || 0,
    paymentMethod: 'cash', source: 'whatsapp', notes: '', status: 'new'
  });
  const [productPickerOpen, setProductPickerOpen] = useState(false);
  const [saving, setSaving] = useState(false);
  const subtotal = useMemo(() => form.items.reduce((s, i) => s + (i.price * i.quantity), 0), [form.items]);
  const total = subtotal + (parseFloat(form.deliveryFee) || 0);

  const addItem = (product) => {
    setForm(f => {
      const existing = f.items.find(i => i.productId === product.id);
      if (existing) return { ...f, items: f.items.map(i => i.productId === product.id ? { ...i, quantity: i.quantity + 1 } : i) };
      return { ...f, items: [...f.items, { productId: product.id, name: product.name, price: product.price, quantity: 1 }] };
    });
    setProductPickerOpen(false);
  };

  const updateItemQty = (idx, qty) => {
    if (qty <= 0) setForm(f => ({ ...f, items: f.items.filter((_, i) => i !== idx) }));
    else setForm(f => ({ ...f, items: f.items.map((it, i) => i === idx ? { ...it, quantity: qty } : it) }));
  };

  const removeItem = (idx) => setForm(f => ({ ...f, items: f.items.filter((_, i) => i !== idx) }));

  const handleSave = async () => {
    if (!form.customerName.trim()) { alert('الرجاء إدخال اسم الزبون'); return; }
    if (form.items.length === 0) { alert('الرجاء إضافة منتج واحد على الأقل'); return; }
    setSaving(true);
    await onSave({ ...form, subtotal, total });
    setSaving(false);
  };

  return (
    <Modal onClose={onClose} title={order ? `تعديل طلب #${order.orderNumber}` : 'طلب جديد'} size="large">
      <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
        <Section title="معلومات الزبون">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px' }}>
            <Field label="الاسم *"><input type="text" value={form.customerName} onChange={(e) => setForm({ ...form, customerName: e.target.value })} style={inputStyle} placeholder="اسم الزبون" /></Field>
            <Field label="رقم التلفون"><input type="tel" value={form.customerPhone} onChange={(e) => setForm({ ...form, customerPhone: e.target.value })} style={inputStyle} placeholder="999xxxxx" /></Field>
          </div>
        </Section>

        <Section title="العنوان">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px' }}>
            <Field label="المنطقة"><input type="text" value={form.address.area} onChange={(e) => setForm({ ...form, address: { ...form.address, area: e.target.value } })} style={inputStyle} placeholder="مثلاً: السالمية" /></Field>
            <Field label="قطعة"><input type="text" value={form.address.block} onChange={(e) => setForm({ ...form, address: { ...form.address, block: e.target.value } })} style={inputStyle} /></Field>
            <Field label="شارع"><input type="text" value={form.address.street} onChange={(e) => setForm({ ...form, address: { ...form.address, street: e.target.value } })} style={inputStyle} /></Field>
            <Field label="جادة"><input type="text" value={form.address.avenue} onChange={(e) => setForm({ ...form, address: { ...form.address, avenue: e.target.value } })} style={inputStyle} /></Field>
            <Field label="بيت"><input type="text" value={form.address.house} onChange={(e) => setForm({ ...form, address: { ...form.address, house: e.target.value } })} style={inputStyle} /></Field>
          </div>
          <div style={{ marginTop: '12px' }}>
            <Field label="تفاصيل إضافية"><textarea value={form.address.extra} onChange={(e) => setForm({ ...form, address: { ...form.address, extra: e.target.value } })} style={{ ...inputStyle, resize: 'vertical', minHeight: '60px' }} placeholder="علامة مميزة / طابق / شقة..." /></Field>
          </div>
        </Section>

        <Section title="المنتجات" action={<button onClick={() => setProductPickerOpen(true)} style={smallPrimaryBtn}><Plus size={14} /> إضافة منتج</button>}>
          {form.items.length === 0 ? (
            <div style={{ padding: '24px', textAlign: 'center', color: '#8a7e66', fontSize: '13px', backgroundColor: '#faf7f0', borderRadius: '10px', border: '1px dashed #e8e2d4' }}>ما فيه منتجات بالطلب. اضغط "إضافة منتج"</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
              {form.items.map((item, idx) => (
                <div key={idx} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '10px 12px', backgroundColor: '#faf7f0', borderRadius: '10px', border: '1px solid #e8e2d4' }}>

                    <div style={{ fontSize: '14px', fontWeight: 500 }}>{item.name}</div>
                    <div className="num" style={{ fontSize: '12px', color: '#8a7e66' }}>{fmt(item.price)} د.ك</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                    <button onClick={() => updateItemQty(idx, item.quantity - 1)} style={qtyBtn}>−</button>
                    <span className="num" style={{ minWidth: '24px', textAlign: 'center', fontWeight: 600 }}>{item.quantity}</span>
                    <button onClick={() => updateItemQty(idx, item.quantity + 1)} style={qtyBtn}>+</button>
                  </div>
                  <div className="num" style={{ minWidth: '70px', textAlign: 'left', fontWeight: 600, color: '#0f5e52' }}>{fmt(item.price * item.quantity)}</div>

                </div>
              ))}
            </div>
          )}

        <Section title="الدفع والمصدر">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '16px' }}>

              <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                {Object.entries(PAYMENTS).map(([k, v]) => {
                  const active = form.paymentMethod === k;
                  return (
                    <button key={k} onClick={() => setForm({ ...form, paymentMethod: k })}
                      style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 12px', borderRadius: '8px', border: '1px solid ' + (active ? '#0f5e52' : '#e8e2d4'), backgroundColor: active ? '#0f5e52' : '#ffffff', color: active ? '#ffffff' : '#4a4438', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>
                      <v.Icon size={14} /> {v.label}
                    </button>
                  );
                })}
              </div>
            </Field>
            <Field label="مصدر الطلب">
              <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                {Object.entries(SOURCES).map(([k, v]) => {
                  const active = form.source === k;
                  return (
                    <button key={k} onClick={() => setForm({ ...form, source: k })}
                      style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 12px', borderRadius: '8px', border: '1px solid ' + (active ? '#0f5e52' : '#e8e2d4'), backgroundColor: active ? '#0f5e52' : '#ffffff', color: active ? '#ffffff' : '#4a4438', fontSize: '13px', fontWeight: 500, cursor: 'pointer' }}>
                      <v.Icon size={14} /> {v.label}
                    </button>
                  );
                })}
              </div>
            </Field>
          </div>
        </Section>

        <Section title="ملاحظات">
          <textarea value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} style={{ ...inputStyle, resize: 'vertical', minHeight: '60px' }} placeholder="أي ملاحظة إضافية..." />
        </Section>

        <Section title="الحساب">
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px' }}>
              <span>المجموع الفرعي</span><span className="num" style={{ fontWeight: 600 }}>{fmt(subtotal)} د.ك</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px', fontSize: '14px' }}>
              <span>التوصيل</span>
              <input type="number" step="0.001" value={form.deliveryFee} onChange={(e) => setForm({ ...form, deliveryFee: parseFloat(e.target.value) || 0 })} className="num" style={{ ...inputStyle, width: '120px', textAlign: 'left' }} />
            </div>
            <div style={{ borderTop: '1px solid #e8e2d4', paddingTop: '10px', display: 'flex', justifyContent: 'space-between', fontSize: '16px', fontWeight: 700 }}>
              <span>الإجمالي</span><span className="num" style={{ color: '#0f5e52' }}>{fmt(total)} د.ك</span>
            </div>
          </div>
        </Section>

        <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end', paddingTop: '8px', borderTop: '1px solid #e8e2d4' }}>
          <button onClick={onClose} disabled={saving} style={secondaryBtn}>إلغاء</button>
          <button onClick={handleSave} disabled={saving} style={{ ...primaryBtn, opacity: saving ? 0.6 : 1 }}><Check size={16} /> {saving ? 'جاري الحفظ...' : (order ? 'حفظ التعديلات' : 'حفظ الطلب')}</button>
        </div>
      </div>
      {productPickerOpen && <ProductPickerModal products={products} onPick={addItem} onClose={() => setProductPickerOpen(false)} />}
    </Modal>
  );
}

function ProductPickerModal({ products, onPick, onClose }) {

}

// ==================== PRODUCT FORM ====================
function ProductFormModal({ product, onSave, onClose }) {
  const [form, setForm] = useState(product || { name: '', price: 0 });
  const [saving, setSaving] = useState(false);
  const handleSave = async () => {
    if (!form.name.trim()) { alert('اكتب اسم المنتج'); return; }
    setSaving(true);
    await onSave({ ...form, price: parseFloat(form.price) || 0 });
    setSaving(false);
  };
  return (
    <Modal onClose={onClose} title={product ? 'تعديل منتج' : 'منتج جديد'} size="small">
      <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
        <Field label="اسم المنتج *"><input type="text" autoFocus value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} style={inputStyle} placeholder="مثلاً: قميص قطن" /></Field>
        <Field label="السعر (د.ك) *"><input type="number" step="0.001" value={form.price} onChange={(e) => setForm({ ...form, price: e.target.value })} style={inputStyle} /></Field>
        <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end', paddingTop: '8px' }}>
          <button onClick={onClose} disabled={saving} style={secondaryBtn}>إلغاء</button>
          <button onClick={handleSave} disabled={saving} style={{ ...primaryBtn, opacity: saving ? 0.6 : 1 }}><Check size={16} /> {saving ? 'جاري الحفظ...' : 'حفظ'}</button>
        </div>
      </div>
    </Modal>
  );
}

// ==================== SHARED ====================
function Modal({ title, children, onClose, size = 'medium' }) {
  const maxWidth = size === 'small' ? '480px' : size === 'large' ? '780px' : '640px';
  return (
    <div className="animate-fade-in" onClick={onClose} style={{ position: 'fixed', inset: 0, backgroundColor: 'rgba(31,27,18,0.45)', zIndex: 40, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '20px 16px', overflowY: 'auto' }}>
      <div onClick={(e) => e.stopPropagation()} className="animate-slide-up" style={{ backgroundColor: '#ffffff', width: '100%', maxWidth, borderRadius: '16px', boxShadow: '0 20px 60px rgba(0,0,0,0.15)', overflow: 'hidden' }}>
        <div style={{ padding: '18px 22px', borderBottom: '1px solid #e8e2d4', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h3 className="font-display" style={{ margin: 0, fontSize: '17px', fontWeight: 600 }}>{title}</h3>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px', color: '#6b6558', borderRadius: '6px' }}><X size={20} /></button>
        </div>
        <div style={{ padding: '20px 22px' }}>{children}</div>
      </div>
    </div>
  );
}

function Section({ title, children, action }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' }}>
        <h4 className="font-display" style={{ margin: 0, fontSize: '13px', fontWeight: 600, color: '#6b6558', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{title}</h4>
        {action}
      </div>
      {children}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
      <span style={{ fontSize: '12px', fontWeight: 500, color: '#6b6558' }}>{label}</span>
      {children}
    </label>
  );
}

function DetailBlock({ icon, title, children }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '11px', fontWeight: 600, color: '#8a7e66', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
        {icon} {title}
      </div>
      {children}
    </div>
  );
}

function EmptyState({ icon, title, description, action }) {
  return (
    <div style={{ padding: '40px 20px', textAlign: 'center' }}>
      <div style={{ width: '64px', height: '64px', borderRadius: '16px', backgroundColor: '#faf7f0', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px' }}>{icon}</div>
      <div className="font-display" style={{ fontSize: '16px', fontWeight: 600, marginBottom: '4px' }}>{title}</div>
      <div style={{ fontSize: '13px', color: '#8a7e66', marginBottom: action ? '16px' : 0 }}>{description}</div>
      {action}
    </div>
  );
}
